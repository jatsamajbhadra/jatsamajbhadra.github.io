<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>जाट कैलेंडर 2026 - जाट समाज संस्थान भादरा</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --brand-green: #11532e; --brand-dark-green: #0b3a20; --brand-gold: #d4af37; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; }
        .master-nav-container { max-width: 1140px; margin: 15px auto; padding: 0 20px; }
        .master-navbar { background: linear-gradient(135deg, var(--brand-dark-green), var(--brand-green)); border-bottom: 4px solid var(--brand-gold); padding: 10px 14px; border-radius: 12px; display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; justify-content: center; }
        .nav-btn { display: inline-flex; align-items: center; gap: 6px; color: #ffffff; text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 700; }
        .nav-btn:hover, .nav-btn.active { background: var(--brand-gold); color: var(--brand-dark-green); }
        .slider-container { max-width: 600px; margin: 20px auto; position: relative; padding: 0 10px; }
        .slide { display: none; text-align: center; }
        .slide img { width: 100%; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 2px solid var(--brand-gold); }
        .nav-arrow { cursor: pointer; position: absolute; top: 40%; transform: translateY(-50%); padding: 15px; background: var(--brand-green); color: white; border: none; border-radius: 50%; font-size: 18px; }
        .prev { left: 0px; } .next { right: 0px; }
        
        /* डाउनलोड बटन स्टाइल */
        .download-btn { display: block; margin: 15px auto; padding: 10px 20px; background: var(--brand-gold); color: var(--brand-dark-green); text-decoration: none; border-radius: 8px; font-weight: bold; width: fit-content; }
        
        .footer-section { background: #0b3a20; color: #ffffff; padding: 20px; text-align: center; font-size: 13px; margin-top: 30px; }
        .disclaimer { font-size: 12px; color: #555; text-align: center; margin: 15px; }
    </style>
</head>
<body>

    <div class="master-nav-container">
        <nav class="master-navbar">
            <a href="https://sites.google.com/view/jatsamajbhadra/" class="nav-btn"><i class="fa-solid fa-house"></i> होम</a>
            <a href="#" class="nav-btn active">📅 जाट कैलेंडर</a>
        </nav>
    </div>

    <div class="slider-container">
        <div class="slide"><img src="images/Calendar_Bhadra_2026_01.png"></div>
        <div class="slide"><img src="images/Calendar_Bhadra_2026_02.png"></div>
        <div class="slide"><img src="images/Calendar_Bhadra_2026_03.png"></div>
        <div class="slide"><img src="images/Calendar_Bhadra_2026_04.png"></div>
        <div class="slide"><img src="images/Calendar_Bhadra_2026_05.png"></div>
        <div class="slide"><img src="images/Calendar_Bhadra_2026_06.png"></div>
        <div class="slide"><img src="images/Calendar_Bhadra_2026_07.png"></div>
        <div class="slide"><img src="images/Calendar_Bhadra_2026_08.png"></div>
        <div class="slide"><img src="images/Calendar_Bhadra_2026_09.png"></div>
        <div class="slide"><img src="images/Calendar_Bhadra_2026_10.png"></div>
        <div class="slide"><img src="images/Calendar_Bhadra_2026_11.png"></div>
        <div class="slide"><img src="images/Calendar_Bhadra_2026_12.png"></div>
        
        <button class="nav-arrow prev" onclick="plusSlides(-1)">❮</button>
        <button class="nav-arrow next" onclick="plusSlides(1)">❯</button>
    </div>

    <!-- डाउनलोड बटन यहाँ आ गया है -->
    <a id="downloadLink" href="#" class="download-btn" download>डाउनलोड करें (Download)</a>

    <p class="disclaimer">नोट: यदि कैलेंडर डाउनलोड नहीं हो रहा, तो इमेज पर लॉन्ग प्रेस (Long Press) करके 'Save Image' करें।</p>

    <div class="footer-section">
        &copy; 2026 जाट समाज संस्थान भादरा | सर्वाधिकार सुरक्षित।<br>
        Designed & Developed by : <a href="https://www.instagram.com/pc_beniwal" target="_blank" style="color: white; text-decoration: underline;">PC Beniwal</a>
    </div>

    <script>
        let slideIndex = 1;
        window.onload = function() { showSlides(slideIndex); }
        
        function plusSlides(n) { showSlides(slideIndex += n); }
        function showSlides(n) {
            let i;
            let slides = document.getElementsByClassName("slide");
            let downloadLink = document.getElementById("downloadLink");
            
            if (n > slides.length) {slideIndex = 1}
            if (n < 1) {slideIndex = slides.length}
            
            for (i = 0; i < slides.length; i++) {slides[i].style.display = "none";}
            slides[slideIndex-1].style.display = "block";
            
            // डाउनलोड लिंक अपडेट करें
            let currentImgSrc = slides[slideIndex-1].getElementsByTagName("img")[0].src;
            downloadLink.href = currentImgSrc;
        }
    </script>
</body>
</html>
